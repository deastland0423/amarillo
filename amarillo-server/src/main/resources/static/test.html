<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amarillo WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
        h2   { color: #a0c4ff; }
        label { color: #aaa; font-size: 0.85em; }
        input, button {
            padding: 6px 10px; margin: 4px 0;
            background: #2a2a4a; color: #e0e0e0;
            border: 1px solid #555; border-radius: 4px;
        }
        button { cursor: pointer; background: #3a5a9a; }
        button:hover { background: #4a6aaa; }
        #status  { margin: 10px 0; padding: 8px; border-radius: 4px; background: #2a2a2a; }
        #log     { margin-top: 16px; }
        .entry   { border-bottom: 1px solid #333; padding: 10px 0; }
        .ts      { color: #888; font-size: 0.8em; }
        pre      { margin: 4px 0; white-space: pre-wrap; word-break: break-all; }
        .ship    { color: #90ee90; }
        .meta    { color: #ffd700; }
    </style>
</head>
<body>

<h2>Amarillo — WebSocket State Monitor</h2>

<div>
    <label>Game ID</label><br>
    <input id="gameId" placeholder="e.g. A3BF" style="width:120px">
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
</div>

<div id="status">Not connected.</div>

<div id="log"></div>

<script>
    let client = null;
    let sub    = null;

    function connect() {
        const gameId = document.getElementById('gameId').value.trim();
        if (!gameId) { setStatus('Enter a game ID first.', 'red'); return; }

        if (client) client.disconnect();

        const socket = new SockJS('/ws');
        client = Stomp.over(socket);
        client.debug = null; // suppress STOMP chatter in console

        client.connect({}, () => {
            setStatus('Connected — subscribed to /topic/games/' + gameId + '/state', '#4caf50');
            sub = client.subscribe('/topic/games/' + gameId + '/state', msg => {
                renderState(JSON.parse(msg.body));
            });
        }, err => {
            setStatus('Connection failed: ' + err, 'salmon');
        });
    }

    function disconnect() {
        if (sub)    { sub.unsubscribe(); sub = null; }
        if (client) { client.disconnect(); client = null; }
        setStatus('Disconnected.', '#aaa');
    }

    function setStatus(msg, color) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.style.color = color || '#e0e0e0';
    }

    function renderState(state) {
        const log = document.getElementById('log');
        const now = new Date().toLocaleTimeString();

        const movable = state.movableNow && state.movableNow.length > 0
            ? state.movableNow.join(', ')
            : '(none)';

        const shipsHtml = (state.ships || []).map(s =>
            `<span class="ship">  ${s.name}</span>  hull=${s.hull}  spd=${s.speed}  loc=${s.location}  facing=${s.facing}`
        ).join('\n');

        const entry = document.createElement('div');
        entry.className = 'entry';
        entry.innerHTML = `
            <div class="ts">${now}</div>
            <pre class="meta">Turn ${state.turn}  |  Impulse ${state.impulse}  |  Phase: ${state.phase}</pre>
            <pre class="meta">Move next: ${movable}</pre>
            <pre>${shipsHtml}</pre>
        `;
        log.prepend(entry);
    }
</script>

</body>
</html>
